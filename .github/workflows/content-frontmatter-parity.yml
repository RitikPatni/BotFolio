name: Content Frontmatter Parity

on:
  pull_request:
    paths:
      - "src/content/**"
      - "scripts/content-frontmatter-parity.mjs"
      - "package.json"
      - ".github/workflows/content-frontmatter-parity.yml"
  push:
    branches: [main]
    paths:
      - "src/content/**"
      - "scripts/content-frontmatter-parity.mjs"
      - "package.json"
      - ".github/workflows/content-frontmatter-parity.yml"

jobs:
  frontmatter-parity:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify frontmatter parity (CI)
        run: npm run content:frontmatter:ci
