name: Goodreads Cover Parity

on:
  pull_request:
    paths:
      - "src/content/books/**"
      - "scripts/goodreads-cover-parity.mjs"
      - "package.json"
      - ".github/workflows/goodreads-cover-parity.yml"
  push:
    branches: [main]
    paths:
      - "src/content/books/**"
      - "scripts/goodreads-cover-parity.mjs"
      - "package.json"
      - ".github/workflows/goodreads-cover-parity.yml"

jobs:
  goodreads-cover-parity:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify Goodreads cover parity (CI)
        run: npm run books:covers:ci
